<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="120" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8EDD8"/>
      <stop offset="100%" stop-color="#E8D4A8"/>
    </linearGradient>
    <filter id="aged">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="120" height="200" rx="8" fill="url(#bg)"/>
  <!-- border double -->
  <rect x="4" y="4" width="112" height="192" rx="6" fill="none" stroke="#C8A030" stroke-width="1.5"/>
  <rect x="7" y="7" width="106" height="186" rx="4" fill="none" stroke="#C8A030" stroke-width="0.6" opacity="0.6"/>
  <text x="60" y="28" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#8B1A1A" style="">II</text>
  <text x="10" y="25" text-anchor="start" font-family="serif" font-size="8" font-weight="normal" fill="#8B1A1A" style="">♦</text>
  <text x="110" y="25" text-anchor="end" font-family="serif" font-size="8" font-weight="normal" fill="#8B1A1A" style="">♦</text>
  <line x1="60" y1="48" x2="60" y2="62" stroke="#8B1A1A" stroke-width="1.5"/>
  <circle cx="60" cy="48" r="1.5" fill="#1A5A1A"/>
  <line x1="57" y1="52" x2="63" y2="52" stroke="#1A5A1A" stroke-width="0.8"/>
  <line x1="57" y1="55" x2="63" y2="55" stroke="#1A5A1A" stroke-width="0.8"/>
  <line x1="60" y1="123" x2="60" y2="137" stroke="#8B1A1A" stroke-width="1.5"/>
  <circle cx="60" cy="123" r="1.5" fill="#1A5A1A"/>
  <line x1="57" y1="127" x2="63" y2="127" stroke="#1A5A1A" stroke-width="0.8"/>
  <line x1="57" y1="130" x2="63" y2="130" stroke="#1A5A1A" stroke-width="0.8"/>
  <text x="60" y="186" text-anchor="middle" font-family="serif" font-size="6.5" font-weight="normal" fill="#2A1A08" style="">TWO OF WANDS</text>

