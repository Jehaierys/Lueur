<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="120" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8EDD8"/>
      <stop offset="100%" stop-color="#E8D4A8"/>
    </linearGradient>
    <filter id="aged">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="120" height="200" rx="8" fill="url(#bg)"/>
  <!-- border double -->
  <rect x="4" y="4" width="112" height="192" rx="6" fill="none" stroke="#C8A030" stroke-width="1.5"/>
  <rect x="7" y="7" width="106" height="186" rx="4" fill="none" stroke="#C8A030" stroke-width="0.6" opacity="0.6"/>
  <text x="60" y="28" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#C8A030" style="">PAGE</text>
  <text x="10" y="25" text-anchor="start" font-family="serif" font-size="8" font-weight="normal" fill="#C8A030" style="">⭐</text>
  <text x="110" y="25" text-anchor="end" font-family="serif" font-size="8" font-weight="normal" fill="#C8A030" style="">⭐</text>
  <rect x="25" y="140" width="70" height="35" rx="3" fill="#C0A060" stroke="#2A1A08" stroke-width="0.8"/>
  <circle cx="60" cy="85" r="8" fill="#FFD0A0" stroke="#2A1A08" stroke-width="0.8"/>
  <path d="M60,93 L60,125 M50,105 L70,105" fill="none" stroke="#C8A030" stroke-width="1.5"/>
  <path d="M60,125 L54,142 M60,125 L66,142" fill="none" stroke="#C8A030" stroke-width="1.2"/>
  <path d="M52,81 L55,73 L60,78 L65,73 L68,81 Z" fill="#C8A030" stroke="#2A1A08" stroke-width="0.5"/>
  <text x="60" y="186" text-anchor="middle" font-family="serif" font-size="6.5" font-weight="normal" fill="#2A1A08" style="">PAGE OF PENTACLES</text>

</svg>