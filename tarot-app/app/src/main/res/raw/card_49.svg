<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="120" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8EDD8"/>
      <stop offset="100%" stop-color="#E8D4A8"/>
    </linearGradient>
    <filter id="aged">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="120" height="200" rx="8" fill="url(#bg)"/>
  <!-- border double -->
  <rect x="4" y="4" width="112" height="192" rx="6" fill="none" stroke="#C8A030" stroke-width="1.5"/>
  <rect x="7" y="7" width="106" height="186" rx="4" fill="none" stroke="#C8A030" stroke-width="0.6" opacity="0.6"/>
  <text x="60" y="28" text-anchor="middle" font-family="serif" font-size="9" font-weight="bold" fill="#8B1A1A" style="">KING</text>
  <text x="10" y="25" text-anchor="start" font-family="serif" font-size="8" font-weight="normal" fill="#8B1A1A" style="">♦</text>
  <text x="110" y="25" text-anchor="end" font-family="serif" font-size="8" font-weight="normal" fill="#8B1A1A" style="">♦</text>
  <rect x="25" y="140" width="70" height="35" rx="3" fill="#C0A060" stroke="#2A1A08" stroke-width="0.8"/>
  <rect x="22" y="100" width="76" height="50" rx="4" fill="#C0A890" stroke="#2A1A08" stroke-width="0.8"/>
  <circle cx="60" cy="83" r="9" fill="#FFD0A0" stroke="#2A1A08" stroke-width="0.8"/>
  <path d="M60,92 L60,118 M48,103 L72,103" fill="none" stroke="#8B1A1A" stroke-width="1.8"/>
  <path d="M51,77 L54,68 L60,74 L66,68 L69,77 Z" fill="#C8A030" stroke="#2A1A08" stroke-width="0.6"/>
  <line x1="72" y1="103" x2="82" y2="78" stroke="#C8A030" stroke-width="2"/>
  <circle cx="82" cy="76" r="3" fill="#C8A030" stroke="#C8A030" stroke-width="1"/>
  <text x="60" y="186" text-anchor="middle" font-family="serif" font-size="6.5" font-weight="normal" fill="#2A1A08" style="">KING OF WANDS</text>

